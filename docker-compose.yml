services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: barber
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-barber}
      POSTGRES_DB: barber_bot
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barber"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Перекрывает DATABASE_URL из .env: внутри docker-compose БД
      # доступна по имени сервиса "db", а не localhost.
      DATABASE_URL: postgresql+asyncpg://barber:${POSTGRES_PASSWORD:-barber}@db:5432/barber_bot
    volumes:
      - bot_jobs:/app/data  # сохраняет jobs.sqlite3 (напоминания) между рестартами контейнера
    ports:
      # /health — всегда (для healthcheck ниже и внешнего мониторинга);
      # тот же порт принимает вебхук, если USE_WEBHOOK=true.
      - "${WEB_SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: barber
      PGPASSWORD: ${POSTGRES_PASSWORD:-barber}
      PGDATABASE: barber_bot
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    volumes:
      - ./backup/backup.sh:/backup.sh:ro
      - backups:/backups
    entrypoint: ["sh", "/backup.sh"]

volumes:
  db_data:
  bot_jobs:
  backups:
